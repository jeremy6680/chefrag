# ==============================================================================
# ChefRAG — Docker Compose
#
# Services:
#   chefrag-ui     → Streamlit app (port 8501)
#   chefrag-chroma → ChromaDB vector store (port 8000)
#
# DuckDB runs inside chefrag-ui via a mounted volume (no separate service).
# ==============================================================================

version: "3.9"

services:
  # ----------------------------------------------------------------------------
  # Streamlit UI + LlamaIndex agent
  # ----------------------------------------------------------------------------
  chefrag-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chefrag-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - APP_PASSWORD=${APP_PASSWORD}
      - APP_LANGUAGE_DEFAULT=${APP_LANGUAGE_DEFAULT:-fr}
      - CHROMA_HOST=chefrag-chroma
      - CHROMA_PORT=8000
      - DUCKDB_PATH=/app/storage/duckdb/chefrag.duckdb
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Recipe JSON exports — writable so Admin UI can save uploads
      - chefrag_data:/app/data
      # DuckDB persistent storage
      - chefrag_duckdb:/app/storage/duckdb
    depends_on:
      chefrag-chroma:
        condition: service_healthy
    networks:
      - chefrag-net
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ----------------------------------------------------------------------------
  # ChromaDB vector store
  # ----------------------------------------------------------------------------
  chefrag-chroma:
    image: chromadb/chroma:0.5.17
    container_name: chefrag-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # ChromaDB persistent storage
      - chefrag_chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - chefrag-net
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/v1/heartbeat"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

# ------------------------------------------------------------------------------
# Named volumes — managed by Docker, persistent across Coolify deployments
# ------------------------------------------------------------------------------
volumes:
  chefrag_data:
  chefraf_duckdb:
  chefrag_chroma:

# ------------------------------------------------------------------------------
# Shared network
# ------------------------------------------------------------------------------
networks:
  chefrag-net:
    driver: bridge
